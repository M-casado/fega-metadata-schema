# ----------------------------------------------------------------------
# Validate FEGA metadata against RDF/SHACL shapes
#
# Goal
# ----
# - Validate all FEGA JSON-LD metadata records against SHACL shapes
#   (HealthDCAT-AP) to ensure RDF-level compliance.
# - Assert that valid examples pass validation.
# - Assert that known-invalid examples fail validation.
#
# What it catches
# ---------------
# 1. SHACL shape constraint violations (e.g., missing required properties).
# 2. RDF/SHACL incompatibilities in valid examples.
# 3. Invalid examples that unexpectedly pass SHACL validation.
#
# Scope
# -----
# - For now, only validates `dataset` entity examples. We may extend it in the future to other DCAT entities such as distributions and catalogs, if added as entities in EGA.
# - Invalid examples are expected to fail both JSON Schema and SHACL/RDF validation.
#
# Trigger
# -------
# - Any PR that touches JSON files, schemas, scripts/, or workflow files.
# - Direct pushes to `main`
#
# Outcome
# -------
# - Fails the job (and therefore blocks the merge) if:
#     – Valid examples do not pass SHACL validation.
#     – Invalid examples do not fail SHACL validation.
# - Always uploads validation summary for inspection.
# ----------------------------------------------------------------------
name: |
  [REQUIRED] Validate FEGA (meta)data (SHACL/RDF shapes)

on:
  pull_request:
    paths:
      - '**/*.json'
      - 'schemas/**'
      - 'standards/**'
      - 'scripts/**'
      - '.github/workflows/**'
  push:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      schemas_ref:
        description: |
          Specify the branch (e.g., dev), tag (e.g., v1.3.11) or commit (e.g., 5fad895) to use as source for validation
        type: string
        required: true
        default: main

jobs:
  validate-rdf-shacl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout (trigger: PR / push)"
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v5

      - name: "Checkout (trigger: manual run)"
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.schemas_ref }}

      # Cache pip dependencies for speed
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install repo in editable mode
        run: pip install -e .

      - name: Validate RDF/SHACL example suite
        run: |
          python scripts/py/validate_rdf_shacl.py \
            --root schemas/entities \
            --entity dataset \
            --shapes standards/rdf/healthdcat-ap/release-6.0.0/shacl/non-public-shapes-v6.ttl \
            --summary-dir . \
            -v

      # Show validation summaries
      - name: Show validation summary in log
        if: always()
        run: |
          echo "=== RDF/SHACL Example Suite Validation ==="
          if [ -f shacl_summary.json ]; then
            jq '.' shacl_summary.json
          else
            echo "'shacl_summary.json' not found"
          fi

      # Upload artifacts
      - name: Upload validation summary
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: shacl-validation-summary
          path: shacl_summary.json
          if-no-files-found: warn
