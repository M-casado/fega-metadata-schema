# ----------------------------------------------------------------------
# Python Test Suite
#
# Goal
# ----
# - Run a small pytest suite for the Python helper code and scripts.
# - Catch import errors and basic helper regressions early.
#
# Scope
# -----
# - Covers tests under `tests/`.
# - Does not run Biovalidator or full metadata validation workflows.
# ----------------------------------------------------------------------
name: |
  [REQUIRED] Python Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/python_tests.yml'
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install repo in editable mode (with dev extras)
        run: pip install -e .[dev]

      - name: Run pytest
        run: pytest
