# ----------------------------------------------------------------------
# Validate FEGA metadata
#
# Goal
# ----
# - Launch a local Biovalidator instance that uses **the current branch's**
#   JSON Schemas (`./entities/**/schema.json`).
# - Validate valid examples to confirm they remain valid.
# - Validate invalid examples to confirm they fail (as expected).
#
# What it catches
# ---------------
# 1. Schemas that no longer compile or reference each other correctly.
# 2. Valid examples that would fail against changes in the schemas.
# 3. Invalid examples that unexpectedly pass validation.
#
# Trigger
# -------
# - Any PR that touches JSON files, schemas, scripts/, or workflow files.
# - Direct pushes to `main`
#
# Outcome
# -------
# - Fails the job (and therefore blocks the merge) if:
#     – Biovalidator cannot start
#     – Valid examples do not pass JSON Schema validation
#     – Invalid examples do not fail JSON Schema validation
# - Always uploads validation summaries for inspection.
# ----------------------------------------------------------------------
name: |
  [REQUIRED] Validate FEGA (meta)data (deploying local biovalidator)

on:
  pull_request:
    paths:
      - '**/*.json'
      - 'entities/**'
      - 'standards/**'
      - 'scripts/**'
      - '.github/workflows/**'
  push:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      schemas_ref:
        description: |
          Specify the branch (e.g., dev), tag (e.g., v1.3.11) or commit (e.g., 5fad895) to use as source (both JSON Schemas and JSON documents) for validation
        type: string
        required: true
        default: main

jobs:
  validate-json-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "Checkout (trigger: PR / push)"
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4

      - name: "Checkout (trigger: manual run)"
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.schemas_ref }}   # The value given at the "Run workflow" form as a string

      # --------------------------------------------------------------
      # Environment: cache Python wheels & npm packages for speed
      # --------------------------------------------------------------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          # On subsequent runs, if the cache key matches (i.e., operating system and the hash of the requirements.txt file),
          #   the dependencies are restored from the cache instead of being downloaded and installed again.
          path: ~/.cache/pip
          # combines the OS type and a hash of the requirements.txt file: the cache is specific to the dependencies listed
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      # --------------------------------------------------------------
      # Tooling: Node (Biovalidator) + Python
      # --------------------------------------------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Biovalidator (dev branch)
        run: |
          # Pull the code directly from GitHub's dev branch
          npm install -g "github:elixir-europe/biovalidator#dev"
          # Consider auditing the issues if there are lots:
          # npm audit fix

      - name: Launch Biovalidator
        run: |
          node "$(npm root -g)/biovalidator/src/biovalidator.js" \
            --port 3020 \
            --ref "./entities/*/schema.json" \
            --ref "./standards/json-schema/**/*.json" \
            > biovalidator.log 2>&1 &
          echo $! > biovalidator.pid

      - name: Wait for Biovalidator to be ready
        run: |
          for i in {1..12}; do
            if curl --output /dev/null --silent --head --fail "http://localhost:3020/validate"; then
              echo "Biovalidator is up"
              exit 0
            fi
            echo "Waiting ($i/12 time(s)) for Biovalidator server to start..."
            sleep 5
          done
          echo "Biovalidator did not start in time" >&2
          exit 1

      - name: Show Biovalidator log (on failure)
        if: failure()
        run: |
          echo "=== biovalidator.log ==="
          if [ -f biovalidator.log ]; then
            cat biovalidator.log
          else
            echo "'biovalidator.log' not found"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # We'll use the latest version of python from major 3 release
          python-version: '3.x'
          cache: 'pip'

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install repo in editable mode
        run: pip install -e .[dev]

      # --------------------------------------------------------------
      # Validation
      # --------------------------------------------------------------
      - name: Validate valid examples (should pass)
        run: |
          script_path="scripts/py/validate_metadata.py"
          # Find and validate only valid examples
          valid_dirs=$(find entities -path "*/examples/valid" -type d)
          if [ -z "$valid_dirs" ]; then
            echo "No valid examples found"
            exit 0
          fi
          python $script_path $valid_dirs --url "http://localhost:3020/validate" > summary_valid.json
          
          # Check that all valid files passed
          n_failed=$(jq '.n_failed_files' summary_valid.json)
          if [ "$n_failed" -ne 0 ]; then
            echo "FAILED: Valid examples did not pass JSON Schema validation"
            cat summary_valid.json
            exit 1
          fi
          echo "All valid examples passed JSON Schema validation"

      - name: Validate invalid examples (should fail)
        run: |
          script_path="scripts/py/validate_metadata.py"
          # Find and validate only invalid examples
          invalid_dirs=$(find entities -path "*/examples/invalid" -type d)
          if [ -z "$invalid_dirs" ]; then
            echo "No invalid examples found"
            exit 0
          fi
          python $script_path $invalid_dirs --url "http://localhost:3020/validate" > summary_invalid.json || true
          
          # Check that summary was created
          if [ ! -f summary_invalid.json ]; then
            echo "No invalid examples to test"
            exit 0
          fi
          
          # Check that all invalid examples failed (as expected)
          n_total=$(jq '.n_total_files' summary_invalid.json)
          n_failed=$(jq '.n_failed_files' summary_invalid.json)
          
          if [ "$n_total" -eq 0 ]; then
            echo "No invalid examples to test"
            exit 0
          fi
          
          if [ "$n_failed" -ne "$n_total" ]; then
            echo "FAILED: Not all invalid examples failed validation as expected"
            echo "Expected all $n_total to fail, but only $n_failed failed"
            cat summary_invalid.json
            exit 1
          fi
          echo "All invalid examples failed JSON Schema validation (as expected)"

      - name: Show summary in log
        if: always()
        run: |
          echo "=== Valid Examples ==="
          if [ -f summary_valid.json ]; then
            jq '.' summary_valid.json
          else
            echo "'summary_valid.json' not found"
          fi
          
          echo ""
          echo "=== Invalid Examples ==="
          if [ -f summary_invalid.json ]; then
            jq '.' summary_invalid.json
          else
            echo "'summary_invalid.json' not found"
          fi

      # --------------------------------------------------------------
      # Artifacts & teardown
      # --------------------------------------------------------------
      # We upload the artifact so we can download the validation summary
      #   even after the logs disappear, and any other tool can access it
      #   easily.
      - name: Upload validation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-validation-summary
          path: |
            summary_valid.json
            summary_invalid.json
          if-no-files-found: warn

      - name: Stop Biovalidator
        if: always()
        run: |
          if [ -f biovalidator.pid ]; then
            # If it was already killed, exit with true
            kill "$(cat biovalidator.pid)" || true
          fi
